name: Build danl999 corpus

on:
  push:
    paths:
      - .github/workflows/build_corpus.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect and clean corpus
        run: python collect_corpus.py

      - name: Validate generated files
        run: |
          test -s danl999_r_castaneda_corpus_2025-07-13_2026-07-12.txt
          test -s corpus_stats.json
          python - <<'PY'
          import json
          from pathlib import Path
          stats = json.loads(Path('corpus_stats.json').read_text(encoding='utf-8'))
          assert stats['included_units'] == stats['included_posts'] + stats['included_comments']
          assert stats['author_text_words'] >= 30000, stats
          print(json.dumps(stats, ensure_ascii=False, indent=2))
          PY

      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: danl999-r-castaneda-corpus
          path: |
            danl999_r_castaneda_corpus_2025-07-13_2026-07-12.txt
            corpus_stats.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit generated corpus for retrieval
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add danl999_r_castaneda_corpus_2025-07-13_2026-07-12.txt corpus_stats.json
          git commit -m "Add generated danl999 corpus" || exit 0
          git push
