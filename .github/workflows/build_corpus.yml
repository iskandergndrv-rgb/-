name: Build danl999 corpus

on:
  push:
    paths:
      - .github/workflows/build_corpus.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect and clean corpus
        run: python collect_corpus.py

      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: danl999-r-castaneda-corpus
          path: |
            danl999_r_castaneda_corpus_2025-07-13_2026-07-12.txt
            corpus_stats.json
          if-no-files-found: error
          retention-days: 7
